<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="./SS19-4.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <div class="todo-app">

            <h1>Todo App</h1>

            <div class="row">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="Add your new todo">

                <button id="addBtn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <ul id="todoList"></ul>

            <div class="footer">

                <span id="taskCount">
                    You have 0 pending tasks
                </span>

                <button id="clearBtn">
                    Clear All
                </button>

            </div>

        </div>

    </div>

    <script src="./SS19-4.js"></script>

</body>
</html>
